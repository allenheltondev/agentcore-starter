openapi: 3.0.0
info:
  version: 1.0.0
  title: AgentCore Chatbot Backend API
  description: Issues SigV4 presigned WebSocket URLs for the browser-direct AgentCore stream.

x-amazon-apigateway-gateway-responses:
  DEFAULT_4XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
  DEFAULT_5XX:
    responseParameters:
      gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
      gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
      gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"

paths:
  /websocket/connect:
    post:
      summary: Generate a presigned WebSocket URL
      operationId: postWebSocketConnect
      description: Returns a SigV4 presigned wss:// URL for the authenticated user.
      security:
        - CognitoAuthorizer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionId:
                  type: string
                  description: Optional session id (generated if omitted).
      responses:
        '200':
          description: Presigned WebSocket URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebSocketConnectResponse'
        '401':
          description: Unauthorized.
        '500':
          description: Internal Server Error.
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketConnectFunction.Arn}/invocations
    options:
      summary: CORS preflight
      operationId: optionsWebSocketConnect
      responses:
        '204':
          description: CORS preflight response.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
            Access-Control-Allow-Methods:
              schema:
                type: string
            Access-Control-Allow-Headers:
              schema:
                type: string
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 204}'
        responses:
          default:
            statusCode: '204'
            responseParameters:
              method.response.header.Access-Control-Allow-Origin: "'*'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"

components:
  securitySchemes:
    CognitoAuthorizer:
      type: apiKey
      name: Authorization
      in: header
      x-amazon-apigateway-authtype: cognito_user_pools
      x-amazon-apigateway-authorizer:
        type: cognito_user_pools
        providerARNs:
          - Fn::GetAtt: [CognitoUserPool, Arn]
  schemas:
    WebSocketConnectResponse:
      type: object
      properties:
        wsUrl:
          type: string
          description: Presigned wss:// URL with SigV4 auth.
        sessionId:
          type: string
        userId:
          type: string
        expiresIn:
          type: integer
          example: 300
